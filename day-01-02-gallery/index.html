<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="gallery-container">
      <h1>DELHI Gallery</h1>
      <section class="gallery">
        <figure class="wide gallery__item">
          <img
            src="https://images.pexels.com/photos/29230105/pexels-photo-29230105.jpeg"
            alt="Tomb Image"
            loading="lazy"
            class="gallery__img"
          />
          <figcaption class="gallery__caption">Tomb</figcaption>
        </figure>
        <figure class="hero gallery__item">
          <img
            src="https://images.pexels.com/photos/31743457/pexels-photo-31743457.jpeg"
            alt="Metro Image"
            loading="lazy"
            class="gallery__img"
          />
          <figcaption class="gallery__caption">Metro</figcaption>
        </figure>
        <figure class="side1 gallery__item">
          <img
            src="https://images.pexels.com/photos/34295609/pexels-photo-34295609.jpeg"
            alt="Market Image"
            loading="lazy"
            class="gallery__img"
          />
          <figcaption class="gallery__caption">Market</figcaption>
        </figure>
        <figure class="side2 gallery__item">
          <img
            src="https://images.pexels.com/photos/13613054/pexels-photo-13613054.jpeg"
            alt="Tomb2 Image"
            loading="lazy"
            class="gallery__img"
          />
          <figcaption class="gallery__caption">Tomb2</figcaption>
        </figure>
        <figure class="side3 gallery__item">
          <img
            src="https://images.pexels.com/photos/32962647/pexels-photo-32962647.jpeg"
            alt="Old Wall Image"
            loading="lazy"
            class="gallery__img"
          />
          <figcaption class="gallery__caption">Old Wall Image</figcaption>
        </figure>
        <figure class="side4 gallery__item">
          <img
            src="https://images.pexels.com/photos/20045156/pexels-photo-20045156.jpeg"
            alt="Old Wall Image"
            loading="lazy"
            class="gallery__img"
          />
          <figcaption class="gallery__caption">Old Wall</figcaption>
        </figure>
        <figure class="side5 gallery__item">
          <img
            src="https://images.pexels.com/photos/12931571/pexels-photo-12931571.jpeg"
            alt="Old City Image"
            loading="lazy"
            class="gallery__img"
          />
          <figcaption class="gallery__caption">Old City</figcaption>
        </figure>
        <figure class="side6 gallery__item">
          <img
            src="https://images.pexels.com/photos/31709020/pexels-photo-31709020.jpeg"
            alt="Red Fort Image"
            loading="lazy"
            class="gallery__img"
          />
          <figcaption class="gallery__caption">Red Fort</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
